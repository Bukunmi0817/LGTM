auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level:        warn

common:
  instance_addr: 127.0.0.1
  path_prefix:   /var/lib/lgtm/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/lgtm/loki/chunks
      rules_directory:  /var/lib/lgtm/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled:    true
        max_size_mb: 100

schema_config:
  configs:
    - from:          "2024-01-01"
      store:         tsdb
      object_store:  filesystem
      schema:        v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  # 30-day log retention
  retention_period:       720h
  ingestion_rate_mb:      16
  ingestion_burst_size_mb: 32
  # Maximum query lookback — prevent runaway historical queries
  max_query_lookback:     720h
  max_query_length:       721h

compactor:
  working_directory:    /var/lib/lgtm/loki/retention
  retention_enabled:    true
  retention_delete_delay: 2h
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://127.0.0.1:9093