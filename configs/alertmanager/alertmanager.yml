global:
  resolve_timeout: 5m
  slack_api_url: "SLACK_WEBHOOK_PLACEHOLDER"

templates:
  - /etc/alertmanager/templates/slack.tmpl

# ----------------------------------------------------------------
# ALERT BUNDLING — this is how multiple alerts become one message
#
# group_by:       group alerts that share these labels together
# group_wait:     wait this long to collect alerts before sending
# group_interval: once a group is sent, wait this long before
#                 sending updates about the same group
# repeat_interval: re-notify if still firing after this long
# ----------------------------------------------------------------
route:
  receiver: "slack-default"
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      group_by: ["alertname", "instance"]
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "slack-warning"
      group_by: ["alertname", "instance"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 6h

    - match_re:
        alertname: "SLO.*"
      receiver: "slack-slo"
      group_by: ["alertname", "slo", "window"]
      group_wait: 10s
      repeat_interval: 30m

    - match:
        metric: "deployment_failure"
      receiver: "slack-cicd"
      group_wait: 0s
      repeat_interval: 30m

    - match:
        severity: info
      receiver: "slack-default"
      group_wait: 1m
      repeat_interval: 24h

# Inhibition: suppress noise when the real problem is "server is down"
# If ServerDown fires, suppress ALL other alerts for that instance
inhibit_rules:
  - source_match:
      alertname: "ServerDown"
      severity: "critical"
    target_match_re:
      severity: "warning|critical"
    equal: ["instance"]

  # If critical fires, suppress the warning version of same alert
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]

receivers:
  - name: "slack-default"
    slack_configs:
      - channel: "SLACK_CHANNEL_PLACEHOLDER"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'
        icon_emoji: ':bell:'

  - name: "slack-critical"
    slack_configs:
      - channel: "SLACK_CHANNEL_PLACEHOLDER"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'
        icon_emoji: ':rotating_light:'

  - name: "slack-warning"
    slack_configs:
      - channel: "SLACK_CHANNEL_PLACEHOLDER"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'
        icon_emoji: ':warning:'

  - name: "slack-slo"
    slack_configs:
      - channel: "SLACK_CHANNEL_PLACEHOLDER"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'
        icon_emoji: ':fire:'

  - name: "slack-cicd"
    slack_configs:
      - channel: "SLACK_CHANNEL_PLACEHOLDER"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'
        icon_emoji: ':rocket:'
