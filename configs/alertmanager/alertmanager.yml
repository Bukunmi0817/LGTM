global:
  resolve_timeout:  5m
  slack_api_url:    "__SLACK_WEBHOOK_PLACEHOLDER__"

templates:
  - "/etc/lgtm/alertmanager/templates/*.tmpl"

route:
  group_by:        ["alertname", "severity", "instance"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver:        "slack-devops-alerts"

  routes:
    - match:
        severity: critical
      receiver:        "slack-devops-alerts"
      group_wait:      10s
      repeat_interval: 1h

    - match_re:
        alertname: ".*(SLO|Burn).*"
      receiver:        "slack-devops-alerts"
      group_by:        ["alertname", "slo"]
      group_wait:      10s
      repeat_interval: 30m

    - match:
        severity: warning
      receiver:        "slack-devops-alerts"
      repeat_interval: 6h

inhibit_rules:
  - source_match:
      alertname: "ServiceDown"
      severity:  "critical"
    target_match_re:
      alertname: "CPU.*|Memory.*|Disk.*|Latency.*"
    equal: ["instance"]

  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]

receivers:
  - name: "slack-devops-alerts"
    slack_configs:
      - channel:       "#DevOps-Alerts"
        send_resolved: true
        title:         '{{ template "slack.title" . }}'
        text:          '{{ template "slack.body" . }}'
        color:         '{{ template "slack.color" . }}'
        icon_emoji:    '{{ template "slack.icon" . }}'
