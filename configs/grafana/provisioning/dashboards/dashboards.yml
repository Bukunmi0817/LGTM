apiVersion: 1

providers:
  - name:                  "lgtm-dashboards"
    orgId:                 1
    type:                  file
    disableDeletion:       true
    updateIntervalSeconds: 30
    allowUiUpdates:        false
    options:
      path:                        /etc/lgtm/grafana/dashboards
      foldersFromFilesStructure:   true
