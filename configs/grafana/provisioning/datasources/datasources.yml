apiVersion: 1

datasources:

  - name:      Prometheus
    type:      prometheus
    uid:       prometheus
    access:    proxy
    url:       http://127.0.0.1:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name:           traceID
          datasourceUid:  tempo

  - name:   Loki
    type:   loki
    uid:    loki
    access: proxy
    url:    http://127.0.0.1:3100
    jsonData:
      derivedFields:
        - datasourceUid:  tempo
          matcherRegex:   "traceID=(\\w+)"
          name:           TraceID
          url:            "$${__value.raw}"
          urlDisplayLabel: "Open in Tempo"

  - name:   Tempo
    type:   tempo
    uid:    tempo
    access: proxy
    url:    http://127.0.0.1:3200
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
      traceQuery:
        timeShiftEnabled:  true
        spanStartTimeShift: "1h"
        spanEndTimeShift:   "-1h"