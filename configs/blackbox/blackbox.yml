modules:
  http_2xx:
    prober:  http
    timeout: 10s
    http:
      valid_http_versions:  ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes:   []
      method:               GET
      follow_redirects:     true
      preferred_ip_protocol: "ip4"
      tls_config:
        insecure_skip_verify: false

  ssl_expiry:
    prober:  http
    timeout: 10s
    http:
      method:           GET
      fail_if_ssl:      false
      fail_if_not_ssl:  true
      tls_config:
        insecure_skip_verify: false

  tcp_connect:
    prober:  tcp
    timeout: 5s

  icmp:
    prober:  icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
