# =============================================================================
# Prometheus configuration — TEMPLATE
#
# This file is used for CI validation only.
# The live config is generated by scripts/lgtm-stack.sh at deploy time
# using APP_SERVER_IP fetched from AWS SSM Parameter Store.
# Do NOT apply this file directly to the server.
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: "production"
    team:        "devops"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "127.0.0.1:9093"
      timeout: 10s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: "node-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["APP_SERVER_IP:9100"]

  - job_name: "fake-service"
    scrape_interval: 15s
    static_configs:
      - targets: ["APP_SERVER_IP:8080"]

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "http://APP_SERVER_IP:8080/health"
    relabel_configs:
      - source_labels: [__address__]
        target_label:  __param_target
      - source_labels: [__param_target]
        target_label:  instance
      - target_label:  __address__
        replacement:   "127.0.0.1:9115"

  - job_name: "blackbox-ssl"
    metrics_path: /probe
    params:
      module: [ssl_expiry]
    static_configs:
      - targets:
          - google.com:443
          - github.com:443
    relabel_configs:
      - source_labels: [__address__]
        target_label:  __param_target
      - source_labels: [__param_target]
        target_label:  instance
      - target_label:  __address__
        replacement:   "127.0.0.1:9115"

  - job_name: "alertmanager"
    static_configs:
      - targets: ["127.0.0.1:9093"]

  - job_name: "grafana"
    static_configs:
      - targets: ["127.0.0.1:3000"]

  - job_name: "loki"
    static_configs:
      - targets: ["127.0.0.1:3100"]

  - job_name: "tempo"
    static_configs:
      - targets: ["127.0.0.1:3200"]

  - job_name: "pushgateway"
    honor_labels: true
    scrape_interval: 15s
    static_configs:
      - targets: ["127.0.0.1:9091"]
