name: Validate configs

# Runs on every Pull Request targeting main.
# This is the gate that keeps bad configs off the server.
# A passing validate workflow is what keeps CFR low.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'terraform/**'
      - 'systemd/**'
      - 'fake-service/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate all configs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      # ----------------------------------------------------------------
      # Terraform validation
      # ----------------------------------------------------------------
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform validate
          echo "Terraform config valid"

      - name: Terraform format check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "Terraform formatting correct"

      # ----------------------------------------------------------------
      # Prometheus config and alert rule validation
      # ----------------------------------------------------------------
      - name: Install promtool
        run: |
          wget -q https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
          tar xzf prometheus-2.51.0.linux-amd64.tar.gz
          sudo mv prometheus-2.51.0.linux-amd64/promtool /usr/local/bin/

      - name: Validate Prometheus config
        run: |
          promtool check config configs/prometheus/prometheus.yml
          echo "prometheus.yml valid"

      - name: Validate alert rules
        run: |
          for f in configs/prometheus/rules/*.yml; do
            echo "Checking $f..."
            promtool check rules "$f"
          done
          echo "All alert rules valid"

      # ----------------------------------------------------------------
      # YAML validation
      # ----------------------------------------------------------------
      - name: Install yamllint
        run: pip install yamllint

      - name: Validate all YAML files
        run: |
          yamllint -c .yamllint configs/
          echo "All YAML configs valid"

      # ----------------------------------------------------------------
      # Grafana dashboard JSON validation
      # ----------------------------------------------------------------
      - name: Validate Grafana dashboard JSON
        run: |
          for f in dashboards/**/*.json; do
            echo "Checking $f..."
            python3 -c "
          import json, sys
          try:
              with open('$f') as fh:
                  d = json.load(fh)
              assert 'uid' in d, 'Missing uid field'
              assert 'title' in d, 'Missing title field'
              assert 'panels' in d, 'Missing panels field'
              print(f'  OK: {d[\"title\"]} ({len(d[\"panels\"])} panels)')
          except Exception as e:
              print(f'  FAIL: {e}')
              sys.exit(1)
          "
          done
          echo "All dashboard JSON files valid"

      # ----------------------------------------------------------------
      # Shell script validation
      # ----------------------------------------------------------------
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          for f in scripts/*.sh; do
            echo "Checking $f..."
            shellcheck "$f" || true
          done
          echo "Shell script check complete"

      # ----------------------------------------------------------------
      # App linting and tests
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: |
          pip install -r fake-service/requirements.txt
          pip install -r fake-service/tests/requirements-test.txt

      - name: Lint fake-service
        run: |
          flake8 fake-service/app.py \
            --max-line-length=120 \
            --ignore=E402,W503
          echo "Linting passed"

      - name: Run fake-service tests
        run: |
          cd fake-service
          pytest tests/ -v
          echo "All tests passed"

      # ----------------------------------------------------------------
      # Summary
      # ----------------------------------------------------------------
      - name: Validation summary
        run: |
          echo "All validations passed."
          echo "This PR is safe to merge."
